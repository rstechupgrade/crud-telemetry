---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: crud-telemetry
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.crud-telemetry.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: crud-telemetry-pods
        static_configs:
          - targets:
              - localhost
            labels:
              namespace: crud-telemetry
              __path__: /var/log/pods/crud-telemetry_*/*/*.log
        pipeline_stages:
          - regex:
              expression: '.*trace_id=(?P<trace_id>[a-f0-9]+).*'
          - labels:
              trace_id:
          - match:
              selector: '{namespace="crud-telemetry"}'
              stages:
                - regex:
                    expression: '/var/log/pods/crud-telemetry_(?P<pod>[^/]+)_[^/]+/(?P<container>[^/]+)/'
                    source: filename
                - labels:
                    pod:
                    container:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: crud-telemetry
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: grafana/promtail:2.9.3
        args:
        - -config.file=/etc/promtail/promtail.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: crud-telemetry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-crud-telemetry
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-crud-telemetry
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: crud-telemetry
roleRef:
  kind: ClusterRole
  name: promtail-crud-telemetry
  apiGroup: rbac.authorization.k8s.io
